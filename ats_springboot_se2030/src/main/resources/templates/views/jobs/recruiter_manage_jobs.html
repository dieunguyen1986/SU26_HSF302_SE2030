<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Job Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</head>
<body>
<div class="container-fluid">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Home</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <form class="d-flex flex-grow-1 me-3">
                    <input class="form-control me-2" type="search" name="keyword" placeholder="Search"
                           aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" th:text="${session.user.fullName}" href="#" id="navbarDropdown"
                           role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="row d-flex justify-content-center mt-5">
        <div class="col-md-11">
            <div class="d-flex justify-content-between">
                <h2>Job Management</h2>

                <button type="button" class="btn btn-primary" onclick="handleAddJob()">Add Job</button>
            </div>
            <hr>
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Title</th>
                    <th scope="col">Location</th>
                    <th scope="col">Description</th>
                    <th scope="col">Min Salary</th>
                    <th scope="col">Max Salary</th>
                    <th scope="col">Deadline</th>
                    <th scope="col">Publish At</th>
                    <th scope="col">Status</th>
                    <th scope="col" style="width: 15%">Action</th>
                </tr>
                </thead>
                <tbody>
                    <tr th:each="job: ${jobs}">
                        <td th:text="${job.id}"></td>
                        <td th:text="${job.title}"></td>
                        <td th:text="${job.location}"></td>
                        <td th:text="${job.description}"></td>
                        <td th:text="${job.salaryMin}"></td>
                        <td th:text="${job.salaryMax}"></td>
                        <td th:text="${job.deadline}"></td>
                        <td th:text="${job.publishedAt}"></td>
                        <td th:text="${job.status}"></td>
                        <td>
                            <a type="button" class="btn btn-primary" th:href="@{'/jobs/'+${job.id}}">Edit</a>
                            <a type="button" class="btn btn-danger">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>
<script>
    function handleAddJob(){
        window.location.href = "/ats_springmvc_se2030/jobs/add"
    }
</script>
</body>
</html>
