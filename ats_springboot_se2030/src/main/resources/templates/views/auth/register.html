<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</head>
<body>
<div class="container-fluid d-flex justify-content-center my-5 ">
    <div class="col-md-3  border rounded-3 p-5 shadow-lg bg-light" style="height: 50vh;">
        <h3 class="text-center mb-3">CREATE A NEW ACCOUNT</h3>
        <p class="text-danger" th:text ="${error}"></p>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <input type="email" name="email" placeholder="admin@example.com" class="form-control" id="email" aria-describedby="emailHelp">
                <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
            </div>
            <div class="mb-3">
                <input type="password" name="password" placeholder="********" class="form-control" id="password">
            </div>
            <div class="mb-3">
                <a class="text-decoration-none text-center" href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-2">Submit</button>

            <p class="text-center">Don't have an account? <a class="text-decoration-none" href="#">Signup</a></p>
        </form>
        <hr>

        <button type="submit" class="btn btn-outline-info w-100 my-3 px-5">Login with Google</button>

    </div>

</div>
</body>
</html>
