<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Job Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
</head>
<body>
<div class="container-fluid">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Home</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <form class="d-flex">
                    <input class="form-control me-2" type="search" name="keyword" placeholder="Search"
                           aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
                <ul>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" th:text="${session.user.fullName}" href="#"
                           id="navbarDropdown"
                           role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="row mx-2 mt-5">
        <h2>Job Detail</h2>
        <hr>
        <form class="row" th:object="${job}" th:action="@{/jobs/add}" method="post">
            <div class="col-md-5 p-3">
                <div class="mb-3">
                    <input type="hidden" class="form-control" th:field="*{id}">
                </div>
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" class="form-control" th:field="*{title}" placeholder="Job Title">
                </div>
                <div class="mb-3">
                    <label for="location" class="form-label">Location</label>
                    <select class="form-select" aria-label="Default select example" th:field="*{location}">
                        <option selected value="">Open this select menu</option>
                        <option value="Hà Nội">Hà Nội</option>
                        <option value="Hồ Chí Minh">Hồ Chí Minh</option>
                        <option value="Đà Nẵng">Đà Nẵng</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="minSalary" class="form-label">Min Salary</label>
                    <input type="number" class="form-control" th:field="*{minSalary}" placeholder="Min Salary">
                </div>

                <div class="mb-3">
                    <label for="maxSalary" class="form-label">Max Salary</label>
                    <input type="number" class="form-control" th:field="*{maxSalary}" placeholder="Max Salary">
                </div>

            </div>
            <div class="col-md-5 p-3">
                <div class="mb-3">
                    <label for="deadline" class="form-label">Deadline</label>
                    <input type="date" class="form-control" th:field="*{deadline}" placeholder="Deadline">
                </div>
                <div class="mb-3">
                    <label for="department" class="form-label">Department</label>
                    <select class="form-select" aria-label="Default select example" th:field="*{departmentId}">
                        <option selected value="">Open this select menu</option>
                        <option th:each="dept: ${departments}" th:value="${dept.id}" th:text="${dept.departmentName}"></option>

                    </select>
                </div>

                <div class="mb-3">
                    <label for="skill" class="form-label">Skills</label>
                    <div th:each="skill: ${skills}" class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" th:value="${skill.id}" th:field="*{skills}">
                        <label class="form-check-label" th:text="${skill.skillName}"></label>
                    </div>

                </div>

                <div class="mb-3">
                    <label for="des" class="form-label">Description</label>
                    <textarea class="form-control" id="dec" rows="3"></textarea>
                </div>


                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn btn-outline-secondary">Close</button>
            </div>

        </form>
    </div>
</div>
</body>
</html>
